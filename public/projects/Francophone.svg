<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#000814"/>
    </radialGradient>

    <!-- Glass card gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Line path gradients -->
    <linearGradient id="blueLineGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b9fff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3b9fff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3b9fff" stop-opacity="1"/>
    </linearGradient>

    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="40" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 40" fill="none" stroke="#1e3a5f" stroke-width="0.5" stroke-opacity="0.3"/>
    </pattern>

    <!-- Star pattern for background -->
    <pattern id="stars" width="200" height="200" patternUnits="userSpaceOnUse">
      <circle cx="30" cy="50" r="0.8" fill="#ffffff" opacity="0.4"/>
      <circle cx="120" cy="30" r="0.5" fill="#ffffff" opacity="0.3"/>
      <circle cx="170" cy="140" r="0.7" fill="#ffffff" opacity="0.35"/>
      <circle cx="80" cy="170" r="0.4" fill="#ffffff" opacity="0.3"/>
      <circle cx="50" cy="120" r="0.6" fill="#ffffff" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="url(#bgGrad)"/>
  <rect width="1200" height="700" fill="url(#stars)" opacity="0.6"/>

  <!-- ================ TITLE BAR ================ -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.1s" fill="freeze"/>
    <g transform="translate(60, 50)">
      <rect x="0" y="0" width="620" height="54" rx="10" fill="url(#glassGrad)" stroke="#5eb3ff" stroke-opacity="0.5" stroke-width="1"/>
      <text x="24" y="34" fill="#e6f2ff" font-size="18" font-weight="400">
        Campaign overview for <tspan font-weight="600" fill="#ffffff">Francophone | Afrique FR</tspan>
      </text>
    </g>

    <!-- Date range -->
    <g transform="translate(720, 50)">
      <rect x="0" y="0" width="420" height="54" rx="10" fill="url(#glassGrad)" stroke="#5eb3ff" stroke-opacity="0.3" stroke-width="1"/>
      <text x="18" y="22" fill="#8fb8d9" font-size="11">Date range:</text>
      <text x="80" y="22" fill="#e6f2ff" font-size="11" font-weight="500">Custom</text>
      <text x="18" y="42" fill="#8fb8d9" font-size="12">📅 2025-09-13</text>
      <text x="130" y="42" fill="#8fb8d9" font-size="12">📅 2026-03-30</text>
      <text x="260" y="42" fill="#8fb8d9" font-size="12">📅 Weekly ▾</text>
    </g>
  </g>

  <!-- ================ KPI CARDS ================ -->
  <!-- Card 1: Clicks (Blue) -->
  <g opacity="0" transform="translate(60, 135)">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.5s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="60,155;60,135" dur="0.5s" begin="0.5s" fill="freeze"/>
    <rect x="0" y="0" width="250" height="115" rx="14" fill="url(#glassGrad)" stroke="#3b9fff" stroke-width="1.5" filter="url(#glow)"/>
    <rect x="0" y="0" width="250" height="115" rx="14" fill="#3b9fff" opacity="0.05"/>
    <!-- Icon -->
    <g transform="translate(20, 22)" fill="#3b9fff">
      <path d="M2 2 L2 14 L6 10 L9 16 L11 15 L8 9 L14 9 Z" opacity="0.9"/>
    </g>
    <text x="46" y="35" fill="#7dc1ff" font-size="14" font-weight="500" letter-spacing="1">Clicks</text>
    <text x="20" y="88" fill="#3b9fff" font-size="44" font-weight="300" filter="url(#glow)">11K</text>
    <text x="225" y="35" fill="#7dc1ff" font-size="12">▾</text>
  </g>

  <!-- Card 2: Impressions (Red) -->
  <g opacity="0" transform="translate(330, 135)">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.7s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="330,155;330,135" dur="0.5s" begin="0.7s" fill="freeze"/>
    <rect x="0" y="0" width="250" height="115" rx="14" fill="url(#glassGrad)" stroke="#ff5a6e" stroke-width="1.5" filter="url(#glow)"/>
    <rect x="0" y="0" width="250" height="115" rx="14" fill="#ff5a6e" opacity="0.05"/>
    <g transform="translate(20, 22)" fill="#ff5a6e">
      <rect x="0" y="8" width="3" height="7" opacity="0.9"/>
      <rect x="5" y="4" width="3" height="11" opacity="0.9"/>
      <rect x="10" y="0" width="3" height="15" opacity="0.9"/>
    </g>
    <text x="46" y="35" fill="#ff8a9a" font-size="14" font-weight="500" letter-spacing="1">Impressions</text>
    <text x="20" y="88" fill="#ff5a6e" font-size="44" font-weight="300" filter="url(#glow)">78K</text>
    <text x="225" y="35" fill="#ff8a9a" font-size="12">▾</text>
  </g>

  <!-- Card 3: CTR (Yellow) -->
  <g opacity="0" transform="translate(600, 135)">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.9s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="600,155;600,135" dur="0.5s" begin="0.9s" fill="freeze"/>
    <rect x="0" y="0" width="250" height="115" rx="14" fill="url(#glassGrad)" stroke="#f5c431" stroke-width="1.5" filter="url(#glow)"/>
    <rect x="0" y="0" width="250" height="115" rx="14" fill="#f5c431" opacity="0.05"/>
    <g transform="translate(20, 22)" fill="#f5c431">
      <path d="M0 14 L5 9 L8 12 L14 4 L14 8 M14 4 L10 4" stroke="#f5c431" stroke-width="1.8" fill="none" opacity="0.9"/>
    </g>
    <text x="46" y="35" fill="#f9d766" font-size="14" font-weight="500" letter-spacing="1">CTR</text>
    <text x="20" y="88" fill="#f5c431" font-size="44" font-weight="300" filter="url(#glow)">14.53%</text>
    <text x="225" y="35" fill="#f9d766" font-size="12">▾</text>
  </g>

  <!-- Card 4: Conv. Rate (Green) -->
  <g opacity="0" transform="translate(870, 135)">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.1s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="870,155;870,135" dur="0.5s" begin="1.1s" fill="freeze"/>
    <rect x="0" y="0" width="270" height="115" rx="14" fill="url(#glassGrad)" stroke="#3de688" stroke-width="1.5" filter="url(#glow)"/>
    <rect x="0" y="0" width="270" height="115" rx="14" fill="#3de688" opacity="0.05"/>
    <g transform="translate(20, 22)" fill="none" stroke="#3de688" stroke-width="1.8">
      <circle cx="7" cy="7" r="7" opacity="0.9"/>
      <path d="M4 7 L6 9 L10 5" opacity="0.9"/>
    </g>
    <text x="46" y="35" fill="#76ecaa" font-size="14" font-weight="500" letter-spacing="1">Conv. rate</text>
    <text x="20" y="88" fill="#3de688" font-size="44" font-weight="300" filter="url(#glow)">22.93%</text>
    <text x="245" y="35" fill="#76ecaa" font-size="12">▾</text>
  </g>

  <!-- ================ CHART AREA ================ -->
  <g opacity="0" transform="translate(60, 290)">
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="1.3s" fill="freeze"/>

    <!-- Chart panel background -->
    <rect x="0" y="0" width="1080" height="360" rx="14" fill="url(#glassGrad)" stroke="#2a4a6f" stroke-width="1"/>

    <!-- Grid -->
    <rect x="20" y="20" width="1040" height="300" fill="url(#grid)" opacity="0.8"/>

    <!-- Baseline axis -->
    <line x1="20" y1="320" x2="1060" y2="320" stroke="#3b9fff" stroke-width="1" stroke-opacity="0.4"/>

    <!-- Date labels -->
    <text x="20" y="345" fill="#8fb8d9" font-size="12" font-style="italic">Sep 8, 2025</text>
    <text x="985" y="345" fill="#8fb8d9" font-size="12" font-style="italic">Mar 30, 2026</text>

    <!-- ========= LINES ========= -->
    <!-- Each line uses stroke-dasharray + stroke-dashoffset animation to "draw in" -->

    <!-- Red line (Impressions - lower band) -->
    <g filter="url(#glow)">
      <path d="M 20,315 L 60,240 L 100,230 L 140,225 L 180,222 L 220,220 L 260,218 L 300,215 L 340,212 L 380,218 L 420,200 L 460,268 L 500,215 L 540,195 L 580,205 L 620,215 L 660,218 L 700,220 L 740,225 L 780,230 L 820,240 L 860,245 L 900,275 L 940,320 L 980,50 L 1020,270 L 1060,320"
            fill="none" stroke="#ff5a6e" stroke-width="2.2" stroke-opacity="0.95"
            stroke-dasharray="4000" stroke-dashoffset="4000">
        <animate attributeName="stroke-dashoffset" from="4000" to="0" dur="2.5s" begin="1.5s" fill="freeze"/>
      </path>
    </g>

    <!-- Blue line (Clicks) -->
    <g filter="url(#glow)">
      <path d="M 20,315 L 60,215 L 100,210 L 140,212 L 180,208 L 220,200 L 260,195 L 300,198 L 340,195 L 380,200 L 420,180 L 460,275 L 500,175 L 540,160 L 580,170 L 620,180 L 660,190 L 700,195 L 740,200 L 780,205 L 820,215 L 860,220 L 900,260 L 940,320 L 980,50 L 1020,255 L 1060,320"
            fill="none" stroke="#3b9fff" stroke-width="2.2" stroke-opacity="0.95"
            stroke-dasharray="4000" stroke-dashoffset="4000">
        <animate attributeName="stroke-dashoffset" from="4000" to="0" dur="2.5s" begin="1.7s" fill="freeze"/>
      </path>
    </g>

    <!-- Yellow line (CTR) -->
    <g filter="url(#glow)">
      <path d="M 20,315 L 60,140 L 100,150 L 140,145 L 180,148 L 220,140 L 260,135 L 300,140 L 340,130 L 380,125 L 420,100 L 460,150 L 500,90 L 540,130 L 580,120 L 620,115 L 660,110 L 700,120 L 740,125 L 780,135 L 820,150 L 860,165 L 900,180 L 940,240 L 980,310 L 1020,250 L 1060,320"
            fill="none" stroke="#f5c431" stroke-width="2.2" stroke-opacity="0.95"
            stroke-dasharray="4000" stroke-dashoffset="4000">
        <animate attributeName="stroke-dashoffset" from="4000" to="0" dur="2.5s" begin="1.9s" fill="freeze"/>
      </path>
    </g>

    <!-- Green line (Conv. rate) -->
    <g filter="url(#glow)">
      <path d="M 20,315 L 60,120 L 100,155 L 140,140 L 180,145 L 220,130 L 260,120 L 300,135 L 340,115 L 380,100 L 420,80 L 460,130 L 500,105 L 540,95 L 580,100 L 620,95 L 660,90 L 700,95 L 740,100 L 780,110 L 820,120 L 860,125 L 900,140 L 940,230 L 980,45 L 1020,225 L 1060,320"
            fill="none" stroke="#3de688" stroke-width="2.2" stroke-opacity="0.95"
            stroke-dasharray="4000" stroke-dashoffset="4000">
        <animate attributeName="stroke-dashoffset" from="4000" to="0" dur="2.5s" begin="2.1s" fill="freeze"/>
      </path>
    </g>

    <!-- ========= DATA POINTS (pulse appear at end) ========= -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.8s" begin="3.8s" fill="freeze"/>
      <!-- Pulse animation on the dramatic spike point -->
      <circle cx="980" cy="45" r="5" fill="#3de688">
        <animate attributeName="r" values="5;10;5" dur="1.8s" begin="4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" begin="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="980" cy="45" r="3" fill="#ffffff"/>
    </g>
  </g>

  <!-- ================ LEGEND (appears last) ================ -->
  <g opacity="0" transform="translate(60, 670)">
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="4.2s" fill="freeze"/>
    <g transform="translate(0, 0)">
      <circle cx="8" cy="0" r="4" fill="#3b9fff" filter="url(#glow)"/>
      <text x="20" y="4" fill="#7dc1ff" font-size="11">Clicks</text>
    </g>
    <g transform="translate(90, 0)">
      <circle cx="8" cy="0" r="4" fill="#ff5a6e" filter="url(#glow)"/>
      <text x="20" y="4" fill="#ff8a9a" font-size="11">Impressions</text>
    </g>
    <g transform="translate(205, 0)">
      <circle cx="8" cy="0" r="4" fill="#f5c431" filter="url(#glow)"/>
      <text x="20" y="4" fill="#f9d766" font-size="11">CTR</text>
    </g>
    <g transform="translate(270, 0)">
      <circle cx="8" cy="0" r="4" fill="#3de688" filter="url(#glow)"/>
      <text x="20" y="4" fill="#76ecaa" font-size="11">Conv. rate</text>
    </g>
  </g>
</svg>
